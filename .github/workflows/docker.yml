name: docker

# Proves the backend image builds reproducibly and is free of HIGH/CRITICAL
# CVEs on every PR that touches the backend or this workflow. Non-pushing:
# pushing the image to ECR is wired in Phase 3 (deploy.yml).

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/docker.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/docker.yml"

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Job name is the required-status-check context used in branch protection.
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: lingosai-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan (HIGH/CRITICAL gate)
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          image-ref: lingosai-backend:ci
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          # Honors .trivyignore (allowlist with justification) if it exists.
          trivyignores: .trivyignore
