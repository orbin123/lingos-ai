name: backend-curriculum

# Pre-deploy guard (Phase 2): a fresh environment must always be able to seed
# both the 24w and 48w calendars from the band source files. These checks run
# offline — tests/conftest.py sets dummy env vars + a SQLite DATABASE_URL, so no
# Postgres/Redis/OpenAI keys are needed.
#
# Paths/test targets follow the Phase-4 test tree (tests/unit/, tests/integration/).

on:
  push:
    branches: [main]
    paths:
      - "backend/app/modules/curriculum/**"
      - "backend/scripts/seed_curriculum.py"
      - "backend/tests/unit/curriculum/**"
      - "backend/tests/integration/curriculum/**"
      - "backend/tests/unit/contracts/test_contract_validation_gate.py"
      - "backend/tests/unit/ai/test_teacher_*.py"
      - "backend/app/ai/agents/teacher.py"
      - "backend/app/modules/curriculum/day_lint.py"
      - "backend/app/modules/sessions/contracts/**"
      - ".github/workflows/backend-curriculum.yml"
  pull_request:
    paths:
      - "backend/app/modules/curriculum/**"
      - "backend/scripts/seed_curriculum.py"
      - "backend/tests/unit/curriculum/**"
      - "backend/tests/integration/curriculum/**"
      - "backend/tests/unit/contracts/test_contract_validation_gate.py"
      - "backend/tests/unit/ai/test_teacher_*.py"
      - "backend/app/ai/agents/teacher.py"
      - "backend/app/modules/curriculum/day_lint.py"
      - "backend/app/modules/sessions/contracts/**"
      - ".github/workflows/backend-curriculum.yml"

jobs:
  curriculum-seed-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Sync deps
        run: uv sync

      - name: Both calendars import cleanly
        run: |
          uv run python -c "
          from app.modules.curriculum.data import load_weeks
          from app.scoring import CourseLength
          w24 = load_weeks(CourseLength.WEEKS_24)
          w48 = load_weeks(CourseLength.WEEKS_48)
          assert (len(w24), sum(len(w.days) for w in w24)) == (24, 168), 'bad 24w shape'
          assert (len(w48), sum(len(w.days) for w in w48)) == (48, 336), 'bad 48w shape'
          print('load_weeks OK: 24w=24/168, 48w=48/336')
          "

      - name: Seed + composer + file-source + teacher tests
        run: |
          uv run pytest \
            tests/unit/curriculum/ \
            tests/integration/curriculum/test_curriculum_seed_smoke.py \
            tests/unit/contracts/test_contract_validation_gate.py \
            tests/unit/ai/test_teacher_prompt.py \
            tests/unit/ai/test_teacher_validation.py \
            tests/unit/ai/test_teacher_repair.py -q
