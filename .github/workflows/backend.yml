name: backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: backend

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - name: Ruff lint
        run: uv run ruff check app tests
      - name: Ruff format check
        # Blocking: the repo was fully `ruff format`'d, so any drift is a real
        # regression. Run `uv run ruff format .` locally before pushing.
        run: uv run ruff format --check app tests

  types:
    runs-on: ubuntu-latest
    # Advisory until app/ is mypy-clean, then drop continue-on-error.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - name: Mypy
        run: uv run mypy app

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - name: Unit tests
        run: uv run pytest tests/unit -q

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - name: Integration tests
        run: uv run pytest tests/integration -q

  coverage:
    # Coverage floor is a whole-suite measure, so the gate runs the full suite
    # in one process via bare `pytest` (testpaths=["tests"]). The suite is order-
    # independent now (the historical a2z STT isolation leak is fixed — both
    # natural order and `pytest tests/unit tests/integration` are green).
    # Floor = measured 75% − 2% ratchet buffer (testing-strategy.md).
    # Raise it as new tests land; never lower it.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - name: Full suite + coverage gate
        run: |
          uv run pytest \
            --cov=app --cov-report=term-missing --cov-report=xml \
            --cov-fail-under=73
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml
