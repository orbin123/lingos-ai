name: backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: backend

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - name: Ruff lint
        run: uv run ruff check app tests
      - name: Ruff format check
        # Blocking: the repo was fully `ruff format`'d, so any drift is a real
        # regression. Run `uv run ruff format .` locally before pushing.
        run: uv run ruff format --check app tests

  types:
    runs-on: ubuntu-latest
    # Blocking: app/ is mypy-clean (config + per-module stub overrides in
    # pyproject.toml). Run `uv run mypy app` locally before pushing.
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - name: Mypy
        run: uv run mypy app

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - name: Unit tests
        run: uv run pytest tests/unit -q

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - name: Integration tests
        run: uv run pytest tests/integration -q

  migrations:
    # Replays the FULL Alembic chain against a truly empty Postgres — the exact
    # Phase-3 launch path (one-off `alembic upgrade head` against a fresh RDS).
    # The unit/integration suites use SQLite `create_all`, so they never exercise
    # the migration graph; this job is the only thing that catches drift between
    # the branched/merged revisions and a clean linear replay. Never delete it.
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: migrate_check
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # database_url points at the empty service; the rest are required-but-unused
      # dummies so app.core.config.settings loads (alembic/env.py imports it).
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/migrate_check
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-dummy
      OPENAI_API_KEY: ci-dummy
      LANGCHAIN_API_KEY: ci-dummy
      PINECONE_API_KEY: ci-dummy
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - name: Alembic upgrade head on empty Postgres
        run: uv run alembic upgrade head
      - name: Verify DB is at a single head
        run: uv run alembic current | grep -q '(head)'

  coverage:
    # Coverage floor is a whole-suite measure, so the gate runs the full suite
    # in one process via bare `pytest` (testpaths=["tests"]). The suite is order-
    # independent now (the historical a2z STT isolation leak is fixed — both
    # natural order and `pytest tests/unit tests/integration` are green).
    # Floor = measured 75% − 2% ratchet buffer (testing-strategy.md).
    # Raise it as new tests land; never lower it.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - name: Full suite + coverage gate
        run: |
          uv run pytest \
            --cov=app --cov-report=term-missing --cov-report=xml \
            --cov-fail-under=73
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml
