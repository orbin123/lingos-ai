name: deploy

# Backend CD (Phase 3). Implements the DEPLOY.md §6 contract:
#   OIDC -> ECR push (git-<sha>) -> migration one-off task -> ECS rolling deploy
#   -> wait stable -> smoke api /health/ready (auto-rollback on failure)
#   -> smoke frontend www 200 (fails the run; backend untouched — G3).
#
# Triggers:
#   * push to `main` -> auto-deploys PRODUCTION (the CI/CD lockstep, G1).
#   * workflow_dispatch -> manual run; pick `staging` or `production` (replays,
#     staging deploys). `github.event.inputs.environment` is null on a push, so
#     every reference resolves it with `|| 'production'`.
# Frontend deploys on Vercel separately (AD-1) on the same `main` commit.
#
# Per-environment config lives in GitHub Environments (Settings -> Environments
# -> staging | production), each with these VARIABLES (from `terraform output`):
#   AWS_REGION, AWS_DEPLOY_ROLE_ARN, ECR_REPOSITORY (full repo URL),
#   ECS_CLUSTER, ECS_SERVICE, ECS_TASK_FAMILY, ECS_MIGRATE_FAMILY,
#   ECS_SUBNETS (comma-separated), ECS_SECURITY_GROUP, HEALTHCHECK_URL.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options: [staging, production]
        default: staging

concurrency:
  # inputs.environment is null on a push -> default to production.
  group: deploy-${{ github.event.inputs.environment || 'production' }}
  cancel-in-progress: false # never interrupt an in-flight deploy

permissions:
  id-token: write # OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v7

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image tags
        id: tags
        run: |
          set -euo pipefail
          # ECR repo is immutable: the unique git-<sha> tag is the only tag we
          # push and the only thing we ever deploy (deploy-by-sha, DEPLOY.md §2).
          SHA_TAG="git-${GITHUB_SHA::7}"
          IMAGE="${{ vars.ECR_REPOSITORY }}"
          echo "sha_tag=$SHA_TAG"   >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE"       >> "$GITHUB_OUTPUT"
          echo "image_sha=$IMAGE:$SHA_TAG" >> "$GITHUB_OUTPUT"

      # The gha cache backend (cache-to/from below) requires the docker-container
      # buildx driver — the default `docker` driver cannot export gha cache.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # ECR repo uses IMMUTABLE tags, so we push only the unique git-<sha> tag
      # (deploy-by-sha, per DEPLOY.md). A moving :latest / daily date tag cannot
      # be overwritten on an immutable repo and would fail every redeploy.
      - name: Build & push image (immutable sha tag)
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Register a migration task-def revision pointing at the NEW image, run it
      # as a one-off, and WAIT for exit 0 before touching the service. On
      # failure the step errors and the deploy aborts — old tasks keep serving.
      - name: Run migrations (alembic upgrade head)
        env:
          IMAGE_SHA: ${{ steps.tags.outputs.image_sha }}
        run: |
          set -euo pipefail
          NEW_TD=$(aws ecs describe-task-definition \
            --task-definition "${{ vars.ECS_MIGRATE_FAMILY }}" \
            --query taskDefinition | \
            jq --arg IMG "$IMAGE_SHA" '
              .containerDefinitions[0].image = $IMG
              | {family, taskRoleArn, executionRoleArn, networkMode, containerDefinitions,
                 requiresCompatibilities, cpu, memory}')
          MIGRATE_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TD" \
            --query taskDefinition.taskDefinitionArn --output text)
          echo "Registered migrate task def: $MIGRATE_ARN"

          SUBNETS="${{ vars.ECS_SUBNETS }}"
          NETCFG="awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[${{ vars.ECS_SECURITY_GROUP }}],assignPublicIp=DISABLED}"
          TASK_ARN=$(aws ecs run-task \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --task-definition "$MIGRATE_ARN" \
            --launch-type FARGATE \
            --network-configuration "$NETCFG" \
            --query 'tasks[0].taskArn' --output text)
          echo "Migration task: $TASK_ARN"

          aws ecs wait tasks-stopped --cluster "${{ vars.ECS_CLUSTER }}" --tasks "$TASK_ARN"
          EXIT=$(aws ecs describe-tasks --cluster "${{ vars.ECS_CLUSTER }}" --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)
          echo "Migration exit code: $EXIT"
          if [ "$EXIT" != "0" ]; then
            echo "::error::Migration failed (exit $EXIT) — aborting deploy."
            exit 1
          fi

      # Snapshot the task-def the service is running RIGHT NOW, before we point
      # it at the new revision. This is the rollback target if the smoke fails.
      - name: Capture current task-def (rollback target)
        run: |
          set -euo pipefail
          PREV_TD=$(aws ecs describe-services \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --services "${{ vars.ECS_SERVICE }}" \
            --query 'services[0].taskDefinition' --output text)
          echo "Previous task-def: $PREV_TD"
          echo "PREV_TD=$PREV_TD" >> "$GITHUB_ENV"

      - name: Deploy backend (rolling update)
        env:
          IMAGE_SHA: ${{ steps.tags.outputs.image_sha }}
        run: |
          set -euo pipefail
          NEW_TD=$(aws ecs describe-task-definition \
            --task-definition "${{ vars.ECS_TASK_FAMILY }}" \
            --query taskDefinition | \
            jq --arg IMG "$IMAGE_SHA" '
              .containerDefinitions[0].image = $IMG
              | {family, taskRoleArn, executionRoleArn, networkMode, containerDefinitions,
                 requiresCompatibilities, cpu, memory}')
          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TD" \
            --query taskDefinition.taskDefinitionArn --output text)
          echo "Registered backend task def: $NEW_ARN"

          aws ecs update-service \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --service "${{ vars.ECS_SERVICE }}" \
            --task-definition "$NEW_ARN" >/dev/null
          echo "Waiting for service to stabilize..."
          aws ecs wait services-stable \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --services "${{ vars.ECS_SERVICE }}"

      # On smoke failure, re-point the service at the previously-running task-def
      # (image is immutable by sha, so rollback is a pointer change) and wait for
      # it to stabilize before failing the job. NOTE: this rolls back the SERVICE
      # only — migrations are forward-only (DEPLOY.md), they are not reverted.
      - name: Smoke test (/health/ready) + auto-rollback
        run: |
          set -euo pipefail
          for i in $(seq 1 10); do
            CODE=$(curl -fsS -o /dev/null -w '%{http_code}' "${{ vars.HEALTHCHECK_URL }}" || true)
            if [ "$CODE" = "200" ]; then
              echo "Smoke OK ($CODE)"; exit 0
            fi
            echo "Attempt $i: got $CODE, retrying..."; sleep 6
          done
          echo "::error::Smoke check failed — rolling back service to $PREV_TD"
          aws ecs update-service \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --service "${{ vars.ECS_SERVICE }}" \
            --task-definition "$PREV_TD" >/dev/null
          aws ecs wait services-stable \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --services "${{ vars.ECS_SERVICE }}"
          echo "::error::Rolled back to $PREV_TD (migrations were NOT reverted — forward-only)."
          exit 1

      # Post-deploy smoke for the FRONTEND (Vercel). Asserts www is serving 200.
      # NOTE: this does NOT roll back the backend — the frontend is a separate
      # Vercel deploy (AD-1), so a down www is not a backend regression. The
      # backend was already gated + rolled-back by the /health/ready step above.
      # Failing here surfaces a frontend outage on the deploy run (G3: "fail the
      # run if either host is down") without touching the healthy backend.
      # FRONTEND_SMOKE_URL defaults to the prod hostname; set the env var to
      # override (e.g. for a staging dispatch).
      - name: Post-deploy smoke (frontend www)
        env:
          FRONTEND_SMOKE_URL: ${{ vars.FRONTEND_SMOKE_URL || 'https://www.lingosai.com' }}
        run: |
          set -euo pipefail
          echo "Smoking frontend: $FRONTEND_SMOKE_URL"
          for i in $(seq 1 10); do
            CODE=$(curl -fsSL -o /dev/null -w '%{http_code}' "$FRONTEND_SMOKE_URL" || true)
            if [ "$CODE" = "200" ]; then
              echo "Frontend smoke OK ($CODE)"; exit 0
            fi
            echo "Attempt $i: got $CODE, retrying..."; sleep 6
          done
          echo "::error::Frontend smoke failed for $FRONTEND_SMOKE_URL (backend left untouched — Vercel deploy is independent)."
          exit 1
